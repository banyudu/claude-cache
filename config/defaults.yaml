# Default thresholds for cache impact analysis
# Tokens are estimated as bytes / 4

# Context window size in tokens (set to match your model)
# Sonnet/Opus: 200000, Sonnet-1M/Opus-1M: 1000000
contextSize: 200000

thresholds:
  # Values can be fixed numbers or percentages of contextSize
  # Single operation: warn if estimated tokens exceed this
  warnTokens: "20%"
  # Single operation: block if estimated tokens exceed this
  blockTokens: "50%"
  # Cumulative session: warn on all subsequent ops after this
  warnCumulativeTokens: "100%"

# Always ask before modifying CLAUDE.md files (system prompt = cache prefix)
protectClaudeMd: true

# Per-tool overrides (optional, also support % or fixed)
# tools:
#   Read:
#     warnTokens: "30%"
#   Write:
#     warnTokens: 20000

# Auto-warm the prompt cache during idle gaps so the next prompt is a cache hit
# instead of a full rebuild. Arming is driven by a Stop hook that runs AFTER each
# reply is delivered — so the turn-terminating ScheduleWakeup call can never swallow
# an answer (this is why it is safe for fast models like Fable). A ping only fires
# after the configured idle interval; real turns already refresh the cache.
warm:
  enabled: true            # set false to disable
  intervalSeconds: 3000    # ~50 min — stay inside the 1h extended cache TTL
  # Slide the deadline forward on every turn (never a mid-activity ping) at the cost
  # of one tiny arming micro-turn per turn. Default false = re-arm only when nothing
  # is pending (no extra turns while chatting; a marathon session fires one stray
  # ping that self-corrects).
  rearmEveryTurn: false
  # Optional manual override — skip warming when the model matches any entry
  # (case-insensitive substring of the model id, e.g. "claude-fable-5"). No longer
  # needed for Fable since arming is post-reply; kept as an escape hatch. Default [].
  excludeModels: []
  # Cap on consecutive idle hours before we stop re-arming. Any real user turn resets the counter.
  #
  # The pure-arithmetic ceiling (assuming the user ALWAYS returns) is ~15.8h, derived from
  # cache-read 0.1x and cache-write 2.0x: 19 pings × 0.1 cost ≈ one 2.0x rewrite.
  # But if the user closes the window, every ping is wasted with zero savings, so the real
  # optimum depends on abandonment probability. Modelling p_abandon=20-50% with mean
  # return time 1-2h, the per-hour return hazard drops below the 6.3% break-even at ~2-6h.
  #
  # 5 sits in the middle of that band: tolerates a quick lunch / errand without overshooting
  # if the session has actually been closed. Raise to 10-15 if you almost never abandon a
  # session; lower to 1-2 if you often start sessions you do not finish.
  maxIdleHours: 5
